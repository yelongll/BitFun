<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型管理 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .toolbar input {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            width: 200px;
        }

        .toolbar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toolbar select {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .table th {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            font-size: 14px;
        }

        .table tbody tr:hover {
            background: var(--bg-tertiary);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state p {
            margin-bottom: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            position: relative;
            background: var(--bg-secondary);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .btn-close:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            padding-top: 8px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: normal;
            color: var(--text);
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .user-select-container {
            position: relative;
        }

        .user-select-container input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }

        .user-select-container input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .user-select-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 200px;
            min-height: 50px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            margin-top: 4px;
        }

        .user-select-list.show {
            display: block;
        }

        .user-select-item {
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .user-select-item:last-child {
            border-bottom: none;
        }

        .user-select-item:hover {
            background: var(--border);
        }

        .user-select-item.selected {
            background: rgba(99, 102, 241, 0.2);
            border-left: 3px solid var(--primary);
        }

        .selected-users {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .selected-user-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        .selected-user-tag .remove {
            cursor: pointer;
            opacity: 0.8;
            font-size: 16px;
            line-height: 1;
        }

        .selected-user-tag .remove:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>AI模型管理</h1>
        <button class="btn btn-primary" onclick="openModal()">添加模型</button>
    </div>

    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="搜索模型名称..." onkeyup="handleSearch(event)">
        <select id="providerFilter" onchange="loadModels(1)">
            <option value="">全部提供商</option>
            <option value="opencode-zen">OpenCode Zen</option>
            <option value="openai">OpenAI</option>
            <option value="nvidia">NVIDIA NIM</option>
            <option value="anthropic">Anthropic</option>
            <option value="deepseek">DeepSeek</option>
            <option value="qwen">通义千问</option>
            <option value="moonshot">Moonshot</option>
            <option value="zhipu">智谱AI</option>
        </select>
    </div>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>提供商</th>
                    <th>模型ID</th>
                    <th>上下文</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="modelsTable">
                <tr><td colspan="6" class="empty-state">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="modal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加模型</h2>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modelId">
                
                <div class="form-group">
                    <label>快速选择预设</label>
                    <select id="presetProvider" onchange="applyPreset()">
                        <option value="">-- 选择预设提供商 --</option>
                        <optgroup label="免费模型">
                            <option value="opencode-zen">OpenCode Zen (免费)</option>
                        </optgroup>
                        <optgroup label="国际模型">
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic (Claude)</option>
                            <option value="google-gemini">Google Gemini</option>
                            <option value="nvidia">NVIDIA NIM</option>
                        </optgroup>
                        <optgroup label="国内模型">
                            <option value="deepseek">DeepSeek</option>
                            <option value="qwen">通义千问 (Qwen)</option>
                            <option value="moonshot">Moonshot (Kimi)</option>
                            <option value="zhipu">智谱AI (GLM)</option>
                            <option value="minimax">MiniMax</option>
                            <option value="baidu">百度文心一言</option>
                            <option value="alibaba">阿里云百炼</option>
                        </optgroup>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>显示名称 *</label>
                    <input type="text" id="modelName" placeholder="如: GPT-4 Turbo">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>提供商 *</label>
                        <input type="text" id="modelProvider" list="providerList" placeholder="选择或输入提供商">
                        <datalist id="providerList">
                            <option value="opencode-zen">
                            <option value="openai">
                            <option value="nvidia">
                            <option value="anthropic">
                            <option value="deepseek">
                            <option value="qwen">
                            <option value="moonshot">
                            <option value="zhipu">
                            <option value="gemini">
                            <option value="minimax">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label>模型ID *</label>
                        <input type="text" id="modelModelName" list="modelNameList" placeholder="如: gpt-4-turbo">
                        <datalist id="modelNameList"></datalist>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>API Base URL</label>
                    <input type="text" id="modelBaseUrl" placeholder="如: https://api.openai.com/v1">
                </div>
                
                <div class="form-group">
                    <label>API 格式</label>
                    <select id="modelApiFormat">
                        <option value="openai">OpenAI (兼容)</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="gemini">Gemini</option>
                        <option value="response">OpenAI Responses</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="modelApiKey" placeholder="留空则不需要API Key">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>上下文窗口</label>
                        <input type="number" id="modelContextWindow" placeholder="4096" value="4096">
                    </div>
                    <div class="form-group">
                        <label>最大输出Token</label>
                        <input type="number" id="modelMaxTokens" placeholder="2048" value="2048">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="modelCategory">
                            <option value="general_chat">通用对话</option>
                            <option value="multimodal">多模态</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>推理模式</label>
                        <select id="modelReasoningMode">
                            <option value="default">默认</option>
                            <option value="enabled">启用</option>
                            <option value="disabled">禁用</option>
                            <option value="adaptive">自适应</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="modelRequiresApiKey" checked> 需要API Key</label>
                        <label><input type="checkbox" id="modelEnabled" checked> 启用</label>
                        <label><input type="checkbox" id="modelIsPublic" checked> 公开</label>
                        <label><input type="checkbox" id="modelIsNew"> 标记为新模型</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>允许使用的用户（留空表示所有用户）</label>
                    <div class="user-select-container">
                        <input type="text" id="userSearchInput" placeholder="点击选择用户或输入搜索..." onkeyup="searchUsers(event)">
                        <div id="userSelectList" class="user-select-list"></div>
                        <div id="selectedUsers" class="selected-users"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveModel()">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let token = localStorage.getItem('admin_token');
        let currentPage = 1;
        let selectedUserIds = [];
        let allUsers = [];
        
        const PROVIDER_PRESETS = {
            'opencode-zen': {
                name: 'OpenCode Zen',
                provider: 'opencode-zen',

                apiFormat: 'openai',

                models: [
                    { name: 'OpenCode Zen 1', modelId: 'opencode-zen-1', context: 32000, maxTokens: 8192 },
                ]
            },
            'openai': {
                name: 'OpenAI',
                provider: 'openai',
                baseUrl: 'https://api.openai.com/v1',

                requiresApiKey: true,
                models: [
                    { name: 'GPT-4o', modelId: 'gpt-4o', context: 128000, maxTokens: 4096 },
                    { name: 'GPT-4o Mini', modelId: 'gpt-4o-mini', context: 128000, maxTokens: 16384 },

                    { name: 'GPT-4', modelId: 'gpt-4', context: 8192, maxTokens: 4096 },
                    { name: 'GPT-3.5 Turbo', modelId: 'gpt-3.5-turbo', context: 16385, maxTokens: 4096 },
                ]
            },
            'nvidia': {
                name: 'NVIDIA NIM',
                provider: 'nvidia',
                baseUrl: 'https://integrate.api.nvidia.com/v1',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'Kimi K2.6', modelId: 'moonshotai/kimi-k2.6', context: 128000, maxTokens: 8192 },
                    { name: 'DeepSeek V3', modelId: 'deepseek-ai/deepseek-v3', context: 128000, maxTokens: 8192 },
                    { name: 'Llama 3.1 405B', modelId: 'meta/llama-3.1-405b-instruct', context: 128000, maxTokens: 8192 },
                    { name: 'Llama 3.1 70B', modelId: 'meta/llama-3.1-70b-instruct', context: 128000, maxTokens: 8192 },
                    { name: 'Qwen 2.5 72B', modelId: 'qwen/qwen2.5-72b-instruct', context: 128000, maxTokens: 8192 },

            },
            'anthropic': {
                name: 'Anthropic',
                provider: 'anthropic',
                baseUrl: 'https://api.anthropic.com',
                apiFormat: 'anthropic',
                requiresApiKey: true,
                models: [
                    { name: 'Claude 3.5 Sonnet', modelId: 'claude-3-5-sonnet-20241022', context: 200000, maxTokens: 8192 },
                    { name: 'Claude 3 Opus', modelId: 'claude-3-opus-20240229', context: 200000, maxTokens: 4096 },
                    { name: 'Claude 3 Sonnet', modelId: 'claude-3-sonnet-20240229', context: 200000, maxTokens: 4096 },
                    { name: 'Claude 3 Haiku', modelId: 'claude-3-haiku-20240307', context: 200000, maxTokens: 4096 },
                ]
            },
            'google-gemini': {
                name: 'Google Gemini',
                provider: 'gemini',
                baseUrl: 'https://generativelanguage.googleapis.com/v1beta',
                apiFormat: 'gemini',
                requiresApiKey: true,
                models: [
                    { name: 'Gemini 1.5 Pro', modelId: 'gemini-1.5-pro', context: 1000000, maxTokens: 8192 },
                    { name: 'Gemini 1.5 Flash', modelId: 'gemini-1.5-flash', context: 1000000, maxTokens: 8192 },
                    { name: 'Gemini Pro', modelId: 'gemini-pro', context: 32760, maxTokens: 2048 },
                ]
            },
            'deepseek': {
                name: 'DeepSeek',
                provider: 'deepseek',
                baseUrl: 'https://api.deepseek.com',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'DeepSeek Chat', modelId: 'deepseek-chat', context: 64000, maxTokens: 4096 },
                    { name: 'DeepSeek Coder', modelId: 'deepseek-coder', context: 64000, maxTokens: 4096 },
                ]
            },
            'qwen': {
                name: '通义千问',
                provider: 'qwen',
                baseUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'Qwen-Max', modelId: 'qwen-max', context: 6000, maxTokens: 2000 },
                    { name: 'Qwen-Plus', modelId: 'qwen-plus', context: 32000, maxTokens: 2000 },
                    { name: 'Qwen-Turbo', modelId: 'qwen-turbo', context: 8000, maxTokens: 2000 },
                ]
            },
            'moonshot': {
                name: 'Moonshot (Kimi)',
                provider: 'moonshot',
                baseUrl: 'https://api.moonshot.cn/v1',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'Kimi K2.6', modelId: 'kimi-k2-0606', context: 128000, maxTokens: 8192 },
                    { name: 'Kimi Latest', modelId: 'kimi-latest', context: 128000, maxTokens: 8192 },
                    { name: 'Moonshot V1 8K', modelId: 'moonshot-v1-8k', context: 8192, maxTokens: 4096 },
                    { name: 'Moonshot V1 32K', modelId: 'moonshot-v1-32k', context: 32768, maxTokens: 4096 },
                    { name: 'Moonshot V1 128K', modelId: 'moonshot-v1-128k', context: 131072, maxTokens: 4096 },
                ]
            },
            'zhipu': {
                name: '智谱AI',
                provider: 'zhipu',
                baseUrl: 'https://open.bigmodel.cn/api/paas/v4',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'GLM-4', modelId: 'glm-4', context: 128000, maxTokens: 4096 },
                    { name: 'GLM-4 Flash', modelId: 'glm-4-flash', context: 128000, maxTokens: 4096 },
                    { name: 'GLM-3 Turbo', modelId: 'glm-3-turbo', context: 128000, maxTokens: 4096 },
                ]
            },
            'minimax': {
                name: 'MiniMax',
                provider: 'minimax',
                baseUrl: 'https://api.minimax.chat/v1',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'abab6.5-chat', modelId: 'abab6.5-chat', context: 245000, maxTokens: 4096 },
                    { name: 'abab5.5-chat', modelId: 'abab5.5-chat', context: 16384, maxTokens: 4096 },
                ]
            },
            'baidu': {
                name: '百度文心一言',
                provider: 'baidu',
                baseUrl: 'https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'ERNIE-Bot 4.0', modelId: 'completions_pro', context: 8000, maxTokens: 2000 },
                    { name: 'ERNIE-Bot Turbo', modelId: 'eb-instant', context: 4000, maxTokens: 2000 },
                ]
            },
            'alibaba': {
                name: '阿里云百炼',
                provider: 'alibaba',
                baseUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
                apiFormat: 'openai',
                requiresApiKey: true,
                models: [
                    { name: 'qwen-turbo', modelId: 'qwen-turbo', context: 8000, maxTokens: 2000 },
                    { name: 'qwen-plus', modelId: 'qwen-plus', context: 32000, maxTokens: 2000 },
                    { name: 'qwen-max', modelId: 'qwen-max', context: 6000, maxTokens: 2000 },
                ]
            }
        };
        
        function applyPreset() {
            const presetKey = document.getElementById('presetProvider').value;
            if (!presetKey) return;
            
            const preset = PROVIDER_PRESETS[presetKey];
            if (!preset) return;
            
            document.getElementById('modelProvider').value = preset.provider;
            document.getElementById('modelBaseUrl').value = preset.baseUrl;
            document.getElementById('modelApiFormat').value = preset.apiFormat;
            document.getElementById('modelRequiresApiKey').checked = preset.requiresApiKey;
            
            const modelList = document.getElementById('modelNameList');
            modelList.innerHTML = preset.models.map(m => 
                `<option value="${m.modelId}">${m.name} (${m.modelId})`
            ).join('');
            
            if (preset.models.length > 0) {
                const firstModel = preset.models[0];
                document.getElementById('modelName').value = firstModel.name;
                document.getElementById('modelModelName').value = firstModel.modelId;
                document.getElementById('modelContextWindow').value = firstModel.context;
                document.getElementById('modelMaxTokens').value = firstModel.maxTokens;
            }
            
            if (!preset.requiresApiKey) {
                document.getElementById('modelApiKey').value = '';
                document.getElementById('modelApiKey').placeholder = '此提供商不需要API Key';
            } else {
                document.getElementById('modelApiKey').placeholder = '请输入API Key';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                window.location.href = 'index.html';
                return;
            }
            loadModels();
            loadAllUsers();
            
            document.getElementById('userSearchInput').addEventListener('focus', () => {
                renderUserList(document.getElementById('userSearchInput').value.toLowerCase());
                document.getElementById('userSelectList').classList.add('show');
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.user-select-container')) {
                    document.getElementById('userSelectList').classList.remove('show');
                }
            });
        });
        
        async function loadAllUsers() {
            try {
                const data = await api('GET', '/api/v1/admin/users?page_size=1000');
                allUsers = data.users || [];
                if (allUsers.length === 0) {
                    document.getElementById('userSearchInput').placeholder = '暂无用户数据';
                    document.getElementById('userSearchInput').disabled = true;
                }
            } catch (e) {
                console.error('Failed to load users:', e);
                document.getElementById('userSearchInput').placeholder = '加载用户失败';
            }
        }
        
        function renderUserList(query) {
            const list = document.getElementById('userSelectList');
            const filtered = query 
                ? allUsers.filter(u => 
                    u.username?.toLowerCase().includes(query) || 
                    u.nickname?.toLowerCase().includes(query) ||
                    u.email?.toLowerCase().includes(query))
                : allUsers;
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="user-select-item" style="color: var(--text-secondary); cursor: default;">无用户数据</div>';
                return;
            }
            
            list.innerHTML = filtered.slice(0, 50).map(user => {
                const isSelected = selectedUserIds.includes(user.id);
                return `
                    <div class="user-select-item ${isSelected ? 'selected' : ''}" onclick="toggleUser(${user.id})">
                        <span>${user.nickname || user.username}</span>
                        <span style="display: flex; align-items: center; gap: 8px;">
                            <span style="color: var(--text-secondary); font-size: 12px;">${user.email || 'ID: ' + user.id}</span>
                            ${isSelected ? '<span style="color: var(--primary);">✓</span>' : ''}
                        </span>
                    </div>
                `;
            }).join('');
        }
        
        function searchUsers(event) {
            const query = event.target.value.toLowerCase();
            renderUserList(query);
            document.getElementById('userSelectList').classList.add('show');
        }
        
        function toggleUser(userId) {
            const index = selectedUserIds.indexOf(userId);
            if (index > -1) {
                selectedUserIds.splice(index, 1);
            } else {
                selectedUserIds.push(userId);
            }
            renderSelectedUsers();
            renderUserList(document.getElementById('userSearchInput').value.toLowerCase());
        }
        
        function removeUser(userId) {
            const index = selectedUserIds.indexOf(userId);
            if (index > -1) {
                selectedUserIds.splice(index, 1);
            }
            renderSelectedUsers();
            renderUserList(document.getElementById('userSearchInput').value.toLowerCase());
        }
        
        function renderSelectedUsers() {
            const container = document.getElementById('selectedUsers');
            if (selectedUserIds.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    <span style="color: var(--text-secondary); font-size: 13px;">已选择 ${selectedUserIds.length} 个用户</span>
                    <button type="button" class="btn btn-secondary" style="padding: 4px 10px; font-size: 12px;" onclick="clearSelectedUsers()">清除全部</button>
                </div>
                <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                    ${selectedUserIds.map(id => {
                        const user = allUsers.find(u => u.id === id);
                        const name = user?.nickname || user?.username || `用户${id}`;
                        return `
                            <span class="selected-user-tag">
                                ${name}
                                <span class="remove" onclick="removeUser(${id})">&times;</span>
                            </span>
                        `;
                    }).join('')}
                </div>
            `;
        }
        
        function clearSelectedUsers() {
            selectedUserIds = [];
            renderSelectedUsers();
            renderUserList(document.getElementById('userSearchInput').value.toLowerCase());
        }
        
        async function api(method, path, data = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                }
            };
            
            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }
            
            if (data && method !== 'GET') {
                options.body = JSON.stringify(data);
            }
            
            const response = await fetch(API_BASE + path, options);
            
            if (response.status === 401) {
                localStorage.removeItem('admin_token');
                window.location.href = 'index.html';
                throw new Error('登录已过期');
            }
            
            const result = await response.json();
            
            if (!result.success) {
                throw new Error(result.error?.message || '请求失败');
            }
            
            return result.data;
        }
        
        async function loadModels(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const provider = document.getElementById('providerFilter').value;
            
            try {
                const params = new URLSearchParams({ page, page_size: 20 });
                if (search) params.append('search', search);
                if (provider) params.append('provider', provider);
                
                const data = await api('GET', `/api/v1/admin/ai-models?${params}`);
                
                const tbody = document.getElementById('modelsTable');
                if (data.models.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>暂无AI模型数据</p><button class="btn btn-primary" onclick="openModal()">添加第一个模型</button></td></tr>';
                } else {
                    tbody.innerHTML = data.models.map(model => `
                        <tr>
                            <td>
                                <strong>${model.name}</strong>
                                ${model.is_new ? '<span style="color: #22c55e; font-size: 10px; margin-left: 6px;" title="新模型">●</span>' : ''}
                            </td>
                            <td>${getProviderLabel(model.provider)}</td>
                            <td><code style="background: var(--bg-tertiary); padding: 4px 8px; border-radius: 4px; font-size: 12px;">${model.model_name}</code></td>
                            <td>${model.context_window ? formatNumber(model.context_window) : '-'}</td>
                            <td><span class="badge ${model.enabled ? 'badge-success' : 'badge-warning'}">${model.enabled ? '启用' : '禁用'}</span></td>
                            <td>
                                <div class="actions">
                                    <button class="btn btn-secondary btn-sm" onclick="editModel(${model.id})">编辑</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteModel(${model.id})">删除</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        function getProviderLabel(provider) {
            const labels = {
                'opencode-zen': 'OpenCode Zen',
                'openai': 'OpenAI',
                'nvidia': 'NVIDIA NIM',
                'anthropic': 'Anthropic',
                'deepseek': 'DeepSeek',
                'qwen': '通义千问',
                'moonshot': 'Moonshot',
                'zhipu': '智谱AI',
                'gemini': 'Gemini',
                'minimax': 'MiniMax'
            };
            return labels[provider] || provider;
        }
        
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        
        function openModal(id = null) {
            document.getElementById('modalTitle').textContent = id ? '编辑模型' : '添加模型';
            document.getElementById('modelId').value = id || '';
            selectedUserIds = [];
            document.getElementById('userSearchInput').value = '';
            document.getElementById('userSearchInput').disabled = allUsers.length === 0;
            
            if (!id) {
                document.getElementById('modelName').value = '';
                document.getElementById('modelProvider').value = '';
                document.getElementById('modelModelName').value = '';
                document.getElementById('modelBaseUrl').value = '';
                document.getElementById('modelApiFormat').value = 'openai';
                document.getElementById('modelContextWindow').value = '4096';
                document.getElementById('modelMaxTokens').value = '2048';
                document.getElementById('modelCategory').value = 'general_chat';
                document.getElementById('modelReasoningMode').value = 'default';
                document.getElementById('modelRequiresApiKey').checked = true;
                document.getElementById('modelEnabled').checked = true;
                document.getElementById('modelIsPublic').checked = true;
                document.getElementById('modelIsNew').checked = false;
            }
            
            renderSelectedUsers();
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        async function editModel(id) {
            try {
                const data = await api('GET', '/api/v1/admin/ai-models');
                const model = data.models.find(m => m.id === id);
                if (!model) {
                    showToast('模型不存在', 'error');
                    return;
                }
                
                openModal(id);
                document.getElementById('modelName').value = model.name;
                document.getElementById('modelProvider').value = model.provider;
                document.getElementById('modelModelName').value = model.model_name;
                document.getElementById('modelBaseUrl').value = model.base_url || '';
                document.getElementById('modelApiFormat').value = model.api_format || 'openai';
                document.getElementById('modelApiKey').value = model.api_key || '';
                document.getElementById('modelContextWindow').value = model.context_window || 4096;
                document.getElementById('modelMaxTokens').value = model.max_tokens || 2048;
                document.getElementById('modelCategory').value = model.category || 'general_chat';
                document.getElementById('modelReasoningMode').value = model.reasoning_mode || 'default';
                document.getElementById('modelRequiresApiKey').checked = model.requires_api_key !== false;
                document.getElementById('modelEnabled').checked = model.enabled;
                document.getElementById('modelIsPublic').checked = model.is_public;
                document.getElementById('modelIsNew').checked = model.is_new === true;
                
                selectedUserIds = model.allowed_users || [];
                document.getElementById('userSearchInput').value = '';
                renderSelectedUsers();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        async function saveModel() {
            const id = document.getElementById('modelId').value;
            const name = document.getElementById('modelName').value.trim();
            const provider = document.getElementById('modelProvider').value.trim();
            const modelName = document.getElementById('modelModelName').value.trim();
            const baseUrl = document.getElementById('modelBaseUrl').value.trim();
            const apiFormat = document.getElementById('modelApiFormat').value;
            const apiKey = document.getElementById('modelApiKey').value;
            const contextWindow = parseInt(document.getElementById('modelContextWindow').value) || 4096;
            const maxTokens = parseInt(document.getElementById('modelMaxTokens').value) || 2048;
            const category = document.getElementById('modelCategory').value;
            const reasoningMode = document.getElementById('modelReasoningMode').value;
            const requiresApiKey = document.getElementById('modelRequiresApiKey').checked;
            const enabled = document.getElementById('modelEnabled').checked;
            const isPublic = document.getElementById('modelIsPublic').checked;
            const isNew = document.getElementById('modelIsNew').checked;
            
            if (!name || !provider || !modelName) {
                showToast('请填写名称、提供商和模型ID', 'error');
                return;
            }
            
            try {
                const data = {
                    name,
                    provider,
                    model_name: modelName,
                    base_url: baseUrl,
                    api_format: apiFormat,
                    api_key: apiKey,
                    context_window: contextWindow,
                    max_tokens: maxTokens,
                    category,
                    reasoning_mode: reasoningMode,
                    requires_api_key: requiresApiKey,
                    is_new: isNew,
                    allowed_users: selectedUserIds.length > 0 ? selectedUserIds : null,
                    capabilities: ['text_chat'],
                    enabled,
                    is_public: isPublic
                };
                
                if (id) {
                    await api('PUT', `/api/v1/admin/ai-models/${id}`, data);
                    showToast('更新成功', 'success');
                } else {
                    await api('POST', '/api/v1/admin/ai-models', data);
                    showToast('创建成功', 'success');
                }
                
                closeModal();
                loadModels(currentPage);
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        async function deleteModel(id) {
            if (!confirm('确定要删除这个模型吗？')) return;
            
            try {
                await api('DELETE', `/api/v1/admin/ai-models/${id}`);
                showToast('删除成功', 'success');
                loadModels(currentPage);
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        function handleSearch(event) {
            if (event.key === 'Enter') {
                loadModels(1);
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
