version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/kongling-server
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  php:
    build: .
    volumes:
      - ./:/var/www/kongling-server
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: kongling_server
      DB_USER: kongling
      DB_PASS: kongling_secret
      JWT_SECRET: ""
      APP_DEBUG: "false"

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: kongling_server
      MYSQL_USER: kongling
      MYSQL_PASSWORD: kongling_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    restart: unless-stopped

volumes:
  mysql_data:
