<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDE编译积分等级系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff9a00, #ff6200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 154, 0, 0.5);
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 20px;
        }
        
        .current-level {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .level-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .level-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }
        
        .level-card:hover::before {
            animation: shine 0.5s ease-in-out;
        }
        
        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
                opacity: 0;
            }
        }
        
        .level-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .level-icon {
            width: 60px;
            height: 60px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .level-icon img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .level-info {
            flex: 1;
        }
        
        .level-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .level-requirement {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 5px;
        }
        
        .level-reward {
            font-size: 0.85rem;
            color: #ffcc00;
        }
        
        .milestone {
            grid-column: span 2;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .milestone .level-name {
            color: #ffcc00;
        }
        
        .level-card.highest-level {
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
            border: 3px solid #ffbe0b;
            box-shadow: 0 0 20px rgba(255, 190, 11, 0.8), 0 0 40px rgba(131, 56, 236, 0.6);
            transform: scale(1.1);
            animation: pulse 2s infinite alternate;
        }
        
        .level-card.highest-level .level-name {
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
        }
        
        .level-card.highest-level .level-requirement {
            color: #ffbe0b;
            font-weight: bold;
        }
        
        .level-card.highest-level .level-reward {
            color: #ff006e;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 110, 0.7);
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 20px rgba(255, 190, 11, 0.8), 0 0 40px rgba(131, 56, 236, 0.6);
            }
            100% {
                box-shadow: 0 0 30px rgba(255, 190, 11, 1), 0 0 60px rgba(131, 56, 236, 0.8);
            }
        }
        
        .level-reward {
            font-size: 0.8rem;
            color: #4ecdc4;
            margin-top: 5px;
            font-weight: bold;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }
        
        .progress-container {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .progress-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .progress-bar {
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #ff9a00, #ff6200);
            width: 35%;
            border-radius: 15px;
            transition: width 1s ease-in-out;
            position: relative;
            overflow: hidden;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        .progress-text {
            text-align: center;
            font-size: 1rem;
        }
        
        .ranking-container {
            margin: 40px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .ranking-title {
            text-align: center;
            margin-bottom: 20px;
            color: #ffcc00;
            font-size: 1.5rem;
        }
        
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .ranking-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        /* 前三名特殊效果 */
        .ranking-item:first-child {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.2));
            border: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            animation: goldGlow 2s infinite alternate;
        }
        
        .ranking-item:nth-child(2) {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.3), rgba(128, 128, 128, 0.2));
            border: 2px solid rgba(192, 192, 192, 0.5);
            box-shadow: 0 0 10px rgba(192, 192, 192, 0.3);
        }
        
        .ranking-item:nth-child(3) {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.3), rgba(139, 69, 19, 0.2));
            border: 2px solid rgba(205, 127, 50, 0.5);
            box-shadow: 0 0 10px rgba(205, 127, 50, 0.3);
        }
        
        @keyframes goldGlow {
            0% {
                box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            }
            100% {
                box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            }
        }
        
        .ranking-level-icon {
            width: 40px;
            height: 40px;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .ranking-level-icon img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .ranking-rank {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.2rem;
            position: relative;
        }
        
        /* 前三名排名徽章特殊样式 */
        .ranking-item:first-child .ranking-rank {
            background: linear-gradient(135deg, #ff9a00, #ff6200);
            color: white;
            box-shadow: 0 0 10px rgba(255, 154, 0, 0.5);
            font-size: 1.4rem;
        }
        
        .ranking-item:first-child .ranking-rank::before {
            content: '👑';
            position: absolute;
            top: -10px;
            right: -5px;
            font-size: 1rem;
        }
        
        .ranking-item:nth-child(2) .ranking-rank {
            background: linear-gradient(135deg, #c0c0c0, #808080);
            color: white;
            font-size: 1.3rem;
        }
        
        .ranking-item:nth-child(2) .ranking-rank::before {
            content: '🥈';
            position: absolute;
            top: -10px;
            right: -5px;
            font-size: 1rem;
        }
        
        .ranking-item:nth-child(3) .ranking-rank {
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            color: white;
            font-size: 1.3rem;
        }
        
        .ranking-item:nth-child(3) .ranking-rank::before {
            content: '🥉';
            position: absolute;
            top: -10px;
            right: -5px;
            font-size: 1rem;
        }
        
        .ranking-item:not(:first-child):not(:nth-child(2)):not(:nth-child(3)) .ranking-rank {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .ranking-info {
            flex: 1;
        }
        
        .ranking-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        
        /* 前三名名字特殊样式 */
        .ranking-item:first-child .ranking-name {
            color: #ffcc00;
            font-size: 1.3rem;
            text-shadow: 0 0 5px rgba(255, 204, 0, 0.5);
        }
        
        .ranking-item:nth-child(2) .ranking-name {
            color: #e0e0e0;
            font-size: 1.2rem;
        }
        
        .ranking-item:nth-child(3) .ranking-name {
            color: #d2b48c;
            font-size: 1.2rem;
        }
        
        .ranking-level {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 3px;
        }
        
        /* 前三名等级特殊样式 */
        .ranking-item:first-child .ranking-level {
            color: #ffcc00;
            font-weight: bold;
        }
        
        .ranking-item:nth-child(2) .ranking-level {
            color: #e0e0e0;
        }
        
        .ranking-item:nth-child(3) .ranking-level {
            color: #d2b48c;
        }
        
        .ranking-count {
            font-size: 0.9rem;
            color: #aaa;
        }
        
        /* 前三名奖杯图标 */
        .ranking-trophy {
            position: absolute;
            right: 15px;
            font-size: 1.5rem;
        }
        
        .ranking-item:first-child .ranking-trophy {
            content: '🏆';
            animation: trophyShine 2s infinite alternate;
        }
        
        .ranking-item:nth-child(2) .ranking-trophy {
            content: '🥈';
        }
        
        .ranking-item:nth-child(3) .ranking-trophy {
            content: '🥉';
        }
        
        @keyframes trophyShine {
            0% {
                filter: brightness(1);
                transform: scale(1);
            }
            100% {
                filter: brightness(1.2);
                transform: scale(1.1);
            }
        }
        
        .filter-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 768px) {
            .level-grid {
                grid-template-columns: 1fr;
            }
            
            .milestone {
                grid-column: span 1;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>空灵语言开发者排名</h1>
            <p class="subtitle">通过不断编写代码提升你的等级，解锁更多开发者特权</p>
            <div class="current-level">当前等级: <span id="current-level">2富</span> | 编译积分: <span id="current-count">35</span></div>
        </header>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: rgba(255, 255, 255, 0.1);"></div>
                <span>普通等级</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: rgba(255, 215, 0, 0.2);"></div>
                <span>里程碑等级</span>
            </div>
        </div>
        
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="basic">基础等级</button>
            <button class="filter-btn" data-filter="noble">贵族等级</button>
            <button class="filter-btn" data-filter="divine">神级等级</button>
        </div>
        
        <div class="level-grid" id="level-grid">
            <!-- 等级卡片将通过JavaScript动态生成 -->
        </div>
        
        <div class="ranking-container">
            <h3 class="ranking-title">开发者排行榜</h3>
            <div class="ranking-list" id="ranking-list">
                <!-- 排名列表将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <div class="progress-container">
            <h3 class="progress-title">升级进度</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text">距离下一级还需 <span id="remaining-count">1,500</span> 次编译</p>
        </div>
        
        <footer>
            <p>© 2025 空灵语言开发者排名 版权所有 | 持续编码，不断进步</p>
        </footer>
    </div>

    <script>
        // 等级数据
        const levels = [
            { name: "1富", requirement: 10, reward: 50, category: "basic" },
            { name: "2富", requirement: 25, reward: 0, category: "basic" },
            { name: "3富", requirement: 50, reward: 0, category: "basic" },
            { name: "4富", requirement: 80, reward: 0, category: "basic" },
            { name: "5富", requirement: 120, reward: 0, category: "basic" },
            { name: "6富", requirement: 180, reward: 100, category: "basic", milestone: true, libraryReward: 1 },
            { name: "7富", requirement: 250, reward: 0, category: "basic" },
            { name: "8富", requirement: 350, reward: 0, category: "basic" },
            { name: "9富", requirement: 500, reward: 0, category: "basic" },
            { name: "10富", requirement: 700, reward: 0, category: "basic", milestone: true, libraryReward: 2 },
            { name: "男爵", requirement: 1000, reward: 3000, category: "noble" },
            { name: "子爵", requirement: 1400, reward: 0, category: "noble" },
            { name: "伯爵", requirement: 1900, reward: 0, category: "noble" },
            { name: "侯爵", requirement: 2500, reward: 0, category: "noble" },
            { name: "公爵", requirement: 3200, reward: 0, category: "noble" },
            { name: "郡公", requirement: 4000, reward: 30000, category: "noble", milestone: true, libraryReward: 3 },
            { name: "国公", requirement: 5000, reward: 0, category: "noble" },
            { name: "王爵", requirement: 6500, reward: 0, category: "noble" },
            { name: "藩王", requirement: 8000, reward: 0, category: "noble" },
            { name: "郡王", requirement: 10000, reward: 0, category: "noble" },
            { name: "亲王", requirement: 12500, reward: 100000, category: "noble", milestone: true, libraryReward: 5 },
            { name: "国王", requirement: 15500, reward: 0, category: "noble" },
            { name: "皇帝", requirement: 19000, reward: 0, category: "noble" },
            { name: "大帝", requirement: 23000, reward: 0, category: "noble" },
            { name: "天君", requirement: 27500, reward: 0, category: "noble" },
            { name: "神", requirement: 32500, reward: 300000, category: "divine", milestone: true, libraryReward: 10 },
            { name: "上神", requirement: 38000, reward: 0, category: "divine" },
            { name: "神皇", requirement: 44000, reward: 0, category: "divine" },
            { name: "神尊", requirement: 50000, reward: 0, category: "divine" },
            { name: "诸神之神", requirement: 60000, reward: 0, category: "divine" },
            { name: "创世神", requirement: 70000, reward: 1000000, category: "divine", milestone: true, libraryReward: 20 },
            { name: "未来神", requirement: 80000, reward: 0, category: "divine" },
            { name: "神之始祖", requirement: 90000, reward: 0, category: "divine" },
            { name: "万古神", requirement: 100000, reward: 0, category: "divine" },
            { name: "宇宙之神", requirement: 120000, reward: 0, category: "divine" },
            { name: "自定义神", requirement: 150000, reward: 0, category: "divine" }
        ];
        
        // 当前用户数据
        let currentLevelIndex = 1; // 2富
        let currentCompileCount = 35;
        
        // 排名数据
        const rankings = [
            { name: "空灵", level: "自定义神", compileCount: 150000 },
            { name: "我爱编码", level: "宇宙之神", compileCount: 120000 },
            { name: "绝世变成高手", level: "万古神", compileCount: 100000 },
            { name: "恐龙抗狼抗", level: "神之始祖", compileCount: 90000 },
            { name: "开发专家", level: "未来神", compileCount: 80000 }
        ];
        
        // 初始化页面
        function init() {
            renderLevels();
            renderRankings();
            updateCurrentLevel();
            updateProgress();
            setupFilterButtons();
        }
        
        // 获取图标路径
        function getIconPath(levelName) {
            // 所有等级图标都直接使用.gif
            return `${levelName}.gif`;
        }
        
        // 渲染排名列表
        function renderRankings() {
            const rankingList = document.getElementById('ranking-list');
            rankingList.innerHTML = '';
            
            rankings.forEach((developer, index) => {
                const rankingItem = document.createElement('div');
                rankingItem.className = 'ranking-item';
                
                let trophyIcon = '';
                if (index === 0) {
                    trophyIcon = '<div class="ranking-trophy">🏆</div>';
                } else if (index === 1) {
                    trophyIcon = '<div class="ranking-trophy">🥈</div>';
                } else if (index === 2) {
                    trophyIcon = '<div class="ranking-trophy">🥉</div>';
                }
                
                // 获取等级图标路径
                const levelIconPath = getLevelIconPath(developer.level);
                
                rankingItem.innerHTML = `
                    ${trophyIcon}
                    <div class="ranking-rank">${index + 1}</div>
                    <div class="ranking-info">
                        <div class="ranking-name">${developer.name}</div>
                        <div class="ranking-level">等级: ${developer.level}</div>
                    </div>
                    <div class="ranking-level-icon">
                        <img src="${levelIconPath}" alt="${developer.level}" title="${developer.level}">
                    </div>
                `;
                
                rankingList.appendChild(rankingItem);
            });
        }
        
        // 获取等级图标路径
        function getLevelIconPath(level) {
            // 等级图标映射表
            const levelIconMap = {
                '自定义神': '自定义神.gif',
                '创世神': '创世神.gif',
                '神之始祖': '神之始祖.gif',
                '诸神之神': '诸神之神.gif',
                '宇宙之神': '宇宙之神.gif',
                '未来神': '未来神.gif',
                '万古神': '万古神.gif',
                '神皇': '神皇.gif',
                '神尊': '神尊.gif',
                '天君': '天君.gif',
                '神': '神.gif',
                '大帝': '大帝.gif',
                '皇帝': '皇帝.gif',
                '国王': '国王.gif',
                '国公': '国公.gif',
                '郡公': '郡公.gif',
                '郡王': '郡王.gif',
                '藩王': '藩王.gif',
                '亲王': '亲王.gif',
                '公爵': '公爵.gif',
                '侯爵': '侯爵.gif',
                '伯爵': '伯爵.gif',
                '子爵': '子爵.gif',
                '男爵': '男爵.gif',
                '王爵': '王爵.gif'
            };
            
            // 返回对应的图标路径，如果没有找到则返回默认图标
            return levelIconMap[level] || '自定义神.gif';
        }
        
        // 渲染等级卡片
        function renderLevels(filter = 'all') {
            const levelGrid = document.getElementById('level-grid');
            levelGrid.innerHTML = '';
            
            levels.forEach((level, index) => {
                if (filter !== 'all' && level.category !== filter) return;
                
                const isCurrentLevel = index === currentLevelIndex;
                const isUnlocked = index <= currentLevelIndex;
                const isMilestone = level.milestone;
                const isHighestLevel = index === levels.length - 1; // 只有最高等级（自定义神）
                
                const levelCard = document.createElement('div');
                levelCard.className = `level-card ${isMilestone ? 'milestone' : ''} ${isCurrentLevel ? 'current' : ''} ${isHighestLevel ? 'highest-level' : ''}`;
                
                // 格式化数字显示
                const formattedRequirement = formatNumber(level.requirement);
                let rewardText = '';
                
                // 只显示里程碑等级的制库奖励
                if (level.libraryReward) {
                    rewardText = `<div class="level-reward">奖励: 官方提供制库 ${level.libraryReward} 次</div>`;
                }
                
                levelCard.innerHTML = `
                    <div class="level-icon">
                        <img src="${getIconPath(level.name)}" alt="${level.name}">
                    </div>
                    <div class="level-info">
                        <div class="level-name">${level.name}</div>
                        <div class="level-requirement">需要: ${formattedRequirement} 次编译</div>
                        ${rewardText}
                    </div>
                `;
                
                // 添加样式
                if (!isUnlocked) {
                    levelCard.style.opacity = '0.6';
                }
                
                if (isCurrentLevel) {
                    levelCard.style.border = '2px solid #ffcc00';
                    levelCard.style.boxShadow = '0 0 15px rgba(255, 204, 0, 0.5)';
                }
                
                levelGrid.appendChild(levelCard);
            });
        }
        
        // 更新当前等级显示
        function updateCurrentLevel() {
            document.getElementById('current-level').textContent = levels[currentLevelIndex].name;
            document.getElementById('current-count').textContent = formatNumber(currentCompileCount);
        }
        
        // 更新进度条
        function updateProgress() {
            const currentLevel = levels[currentLevelIndex];
            const nextLevel = levels[currentLevelIndex + 1];
            
            if (!nextLevel) {
                // 已达到最高等级
                document.getElementById('progress-fill').style.width = '100%';
                document.getElementById('remaining-count').textContent = '0';
                document.querySelector('.progress-text').textContent = '已达到最高开发者等级！';
                return;
            }
            
            const currentRequirement = currentLevel.requirement;
            const nextRequirement = nextLevel.requirement;
            const progress = ((currentCompileCount - currentRequirement) / (nextRequirement - currentRequirement)) * 100;
            
            document.getElementById('progress-fill').style.width = `${Math.min(progress, 100)}%`;
            document.getElementById('remaining-count').textContent = formatNumber(nextRequirement - currentCompileCount);
        }
        
        // 设置筛选按钮
        function setupFilterButtons() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // 更新按钮状态
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    
                    // 筛选等级
                    const filter = button.getAttribute('data-filter');
                    renderLevels(filter);
                });
            });
        }
        
        // 格式化数字
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
        
        // 模拟编译积分增加
        function simulateCompile() {
            currentCompileCount += Math.floor(Math.random() * 100) + 1;
            
            // 检查是否升级
            if (currentLevelIndex < levels.length - 1 && 
                currentCompileCount >= levels[currentLevelIndex + 1].requirement) {
                currentLevelIndex++;
                showLevelUpNotification(levels[currentLevelIndex].name);
            }
            
            updateCurrentLevel();
            updateProgress();
            renderLevels(document.querySelector('.filter-btn.active').getAttribute('data-filter'));
        }
        
        // 显示升级通知
        function showLevelUpNotification(levelName) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #ff9a00, #ff6200);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideIn 0.5s ease-out;
            `;
            notification.innerHTML = `<h3>恭喜升级！</h3><p>您已达到 ${levelName} 等级</p>`;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.5s ease-out forwards';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 500);
            }, 3000);
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // 初始化页面
        init();
        
        // 模拟编译按钮（可选）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' && e.ctrlKey) {
                e.preventDefault();
                simulateCompile();
            }
        });
    </script>
</body>
</html>
