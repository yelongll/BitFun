name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'png/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'png/**'

# Cancel previous runs on same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Rust: build check ─────────────────────────────────────────────
  rust-build-check:
    name: Rust Build Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: frontend-build
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenSSL (Windows, prebuilt)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/ci/setup-openssl-windows.ps1

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Create mobile-web dist directory (workaround for Tauri)
        shell: bash
        run: mkdir -p src/mobile-web/dist

      - name: Install Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_PKG=libwebkit2gtk-4.0-dev
          fi

          if apt-cache show libappindicator3-dev >/dev/null 2>&1; then
            APPINDICATOR_PKG=libappindicator3-dev
          else
            APPINDICATOR_PKG=libayatana-appindicator3-dev
          fi

          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            "$WEBKIT_PKG" \
            "$APPINDICATOR_PKG" \
            librsvg2-dev \
            patchelf \
            libleptonica-dev \
            libtesseract-dev \
            tesseract-ocr \
            tesseract-ocr-eng

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "ci-check-${{ runner.os }}"

      - name: Check compilation
        run: cargo check --workspace --exclude bitfun-cli

      - name: Run core Rust tests
        run: cargo test --locked -p bitfun-core

  # ── Frontend: build ────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web UI
        run: pnpm run lint:web

      - name: Build web UI
        run: pnpm run build:web

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 1
