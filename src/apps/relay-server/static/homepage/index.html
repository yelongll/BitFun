<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="description" content="空灵语言 Relay Server — Remote Connect Relay Service." />
  <title>空灵语言 Relay Server</title>
  <link rel="icon" type="image/png" href="https://openbitfun.com/Logo-ICON.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0a0e1a;--surface:rgba(255,255,255,.04);--surface-hover:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.08);--border-hover:rgba(74,222,128,.25);
      --text:#e2e8f0;--text-dim:#64748b;--accent:#22c55e;--blue:#38bdf8;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:"DM Sans",system-ui,sans-serif;color:var(--text);background:var(--bg)}

    /* ── BG layers ── */
    .glow{position:fixed;inset:0;pointer-events:none;z-index:0}
    .glow::before,.glow::after{content:"";position:absolute;border-radius:50%;filter:blur(100px);opacity:.35}
    .glow::before{width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(56,189,248,.3),transparent 70%)}
    .glow::after{width:500px;height:500px;bottom:-180px;right:-80px;background:radial-gradient(circle,rgba(34,197,94,.25),transparent 70%)}
    .grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
      background-size:60px 60px}

    /* ── Shell: 100vh, content centered ── */
    .shell{
      position:relative;z-index:1;
      width:min(calc(100% - 48px),960px);
      margin:0 auto;height:100vh;
      display:flex;flex-direction:column;
      justify-content:center;
      padding:0;
    }
    .inner{
      display:flex;flex-direction:column;
      gap:clamp(28px,8vh,100px);
    }

    /* ── Nav (pinned top) ── */
    nav{
      position:absolute;top:clamp(14px,2vh,24px);left:0;right:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 4px;
    }
    .brand{display:flex;align-items:center;gap:10px}
    .brand-dot{width:8px;height:8px;border-radius:3px;flex:none;background:linear-gradient(135deg,var(--blue),var(--accent));box-shadow:0 0 14px rgba(34,197,94,.4)}
    .brand-name{font-family:"Space Grotesk",sans-serif;font-size:.88rem;font-weight:600;letter-spacing:.01em}
    .nav-right{display:flex;align-items:center;gap:8px}
    .lang-btn{padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:"Space Grotesk",sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.04em;transition:border-color .2s,color .2s}
    .lang-btn:hover{border-color:rgba(255,255,255,.18);color:var(--text)}
    .lang-btn:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px}
    .status-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;border:1px solid rgba(34,197,94,.14);background:rgba(34,197,94,.05);font-size:.72rem;color:#86efac}
    .status-dot{width:5px;height:5px;border-radius:50%;flex:none;background:var(--accent);box-shadow:0 0 0 3px rgba(34,197,94,.12);animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── Hero ── */
    .hero{text-align:center}
    .hero-logo{width:clamp(56px,8vw,80px);height:clamp(56px,8vw,80px);margin:0 auto clamp(10px,1.5vh,18px);display:block;border-radius:18px;filter:drop-shadow(0 4px 24px rgba(34,197,94,.18))}
    .hero h1{font-family:"Space Grotesk",sans-serif;font-size:clamp(2rem,4.5vw,3.4rem);font-weight:700;line-height:1.08;letter-spacing:-.045em}
    .grad{background:linear-gradient(135deg,var(--blue),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{margin:clamp(6px,1vh,12px) auto 0;max-width:440px;font-size:clamp(.84rem,1vw,.92rem);line-height:1.6;color:var(--text-dim)}
    .cta{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:clamp(14px,2.2vh,24px)}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:999px;font-family:"Space Grotesk",sans-serif;font-size:.84rem;font-weight:600;text-decoration:none;cursor:pointer;transition:transform .2s ease-out,box-shadow .2s ease-out,border-color .2s ease-out,background .2s ease-out}
    .btn:hover{transform:translateY(-1px)}
    .btn:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:3px}
    .btn svg{width:16px;height:16px;flex:none}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#16a34a);color:#052e16;box-shadow:0 8px 24px rgba(34,197,94,.2)}
    .btn-primary:hover{box-shadow:0 12px 32px rgba(34,197,94,.3)}
    .btn-primary svg{color:#052e16}
    .btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
    .btn-ghost:hover{border-color:var(--border-hover);background:var(--surface-hover)}

    /* ── Flow diagram ── */
    .flow{display:flex;align-items:center;justify-content:center;gap:0;padding:0 10px}
    .flow-node{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none;width:clamp(100px,14vw,150px)}
    .flow-circle{
      width:clamp(52px,6vw,68px);height:clamp(52px,6vw,68px);border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      border:1px solid var(--border);backdrop-filter:blur(8px);transition:border-color .3s;
    }
    .flow-circle svg{width:clamp(22px,2.6vw,30px);height:clamp(22px,2.6vw,30px)}
    .flow-node:nth-child(1) .flow-circle{background:rgba(56,189,248,.06);color:var(--blue)}
    .flow-node:nth-child(1):hover .flow-circle{border-color:rgba(56,189,248,.3)}
    .flow-node:nth-child(3) .flow-circle{background:rgba(34,197,94,.06);color:var(--accent);border-color:rgba(34,197,94,.18)}
    .flow-node:nth-child(3):hover .flow-circle{border-color:rgba(34,197,94,.35)}
    .flow-node:nth-child(5) .flow-circle{background:rgba(148,163,184,.05);color:#94a3b8}
    .flow-node:nth-child(5):hover .flow-circle{border-color:rgba(148,163,184,.25)}
    .flow-label{font-family:"Space Grotesk",sans-serif;font-size:clamp(.72rem,.9vw,.84rem);font-weight:600;letter-spacing:-.01em;text-align:center}
    .flow-sublabel{font-size:clamp(.62rem,.72vw,.72rem);color:var(--text-dim);text-align:center;line-height:1.4}
    .flow-arrow{flex:1;min-width:24px;max-width:140px;height:1px;position:relative;background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.12),rgba(255,255,255,.04))}
    .flow-arrow::before,.flow-arrow::after{content:"";position:absolute;top:50%;width:0;height:0}
    .flow-arrow::before{left:-1px;transform:translateY(-50%);border-top:4px solid transparent;border-bottom:4px solid transparent;border-right:6px solid rgba(255,255,255,.18)}
    .flow-arrow::after{right:-1px;transform:translateY(-50%);border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:6px solid rgba(255,255,255,.18)}
    .flow-arrow-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:clamp(.58rem,.68vw,.66rem);color:var(--text-dim);letter-spacing:.03em;text-transform:uppercase}

    /* ── Features ── */
    .features{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .feat{padding:clamp(14px,2vh,20px) 16px;border-radius:14px;border:1px solid var(--border);background:var(--surface);backdrop-filter:blur(8px);transition:border-color .2s}
    .feat:hover{border-color:rgba(255,255,255,.14)}
    .feat-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .feat-icon{width:28px;height:28px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center}
    .feat-icon svg{width:14px;height:14px}
    .feat-icon.blue{background:rgba(56,189,248,.1);color:var(--blue)}
    .feat-icon.green{background:rgba(34,197,94,.1);color:var(--accent)}
    .feat-icon.slate{background:rgba(148,163,184,.08);color:#94a3b8}
    .feat h3{font-family:"Space Grotesk",sans-serif;font-size:.82rem;font-weight:600;letter-spacing:-.01em}
    .feat p{font-size:.74rem;line-height:1.55;color:var(--text-dim)}

    /* ── Footer (pinned bottom) ── */
    footer{
      position:absolute;bottom:clamp(10px,1.5vh,16px);left:0;right:0;
      text-align:center;color:var(--text-dim);font-size:.68rem;letter-spacing:.02em;
    }

    /* ── Responsive ── */
    @media(max-width:768px){
      html,body{overflow:auto;height:auto}
      .shell{height:auto;min-height:100vh;justify-content:flex-start;padding:60px 0 40px}
      nav{position:relative;top:0;margin-bottom:20px}
      footer{position:relative;bottom:0;margin-top:24px}
      .features{grid-template-columns:1fr}
      .flow{flex-direction:column;gap:16px}
      .flow-arrow{width:1px;height:28px;min-width:unset;max-width:unset;
        background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.12),rgba(255,255,255,.04))}
      .flow-arrow::before{left:50%;top:-1px;right:auto;transform:translateX(-50%);
        border:none;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:6px solid rgba(255,255,255,.18)}
      .flow-arrow::after{right:auto;top:auto;bottom:-1px;left:50%;transform:translateX(-50%);
        border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid rgba(255,255,255,.18);border-bottom:none}
      .flow-arrow-label{top:50%;left:calc(100% + 10px);transform:translateY(-50%)}
      .cta{flex-direction:column;align-items:center}
      .btn{width:100%;max-width:260px;justify-content:center}
    }
    @media(max-width:480px){
      .shell{width:min(calc(100% - 24px),960px)}
      nav{flex-direction:column;align-items:flex-start;gap:10px}
      .nav-right{width:100%;justify-content:space-between}
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <div class="shell">
    <nav>
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">空灵语言 Relay Server</span>
      </div>
      <div class="nav-right">
        <button class="lang-btn" id="langToggle" type="button" aria-label="Switch language">中 / EN</button>
        <div class="status-pill">
          <span class="status-dot" aria-hidden="true"></span>
          <span data-i18n="status">服务运行中</span>
        </div>
      </div>
    </nav>

    <main class="inner">
      <section class="hero">
        <img class="hero-logo" src="https://openbitfun.com/Logo-ICON.png" alt="空灵语言 Logo" />
        <h1><span class="grad">空灵语言</span> Relay Server</h1>
        <p class="hero-sub" data-i18n="desc">桌面端与移动端之间的中继服务，提供配对与消息转发能力。</p>
        <div class="cta">
          <a class="btn btn-primary" href="https://openbitfun.com/" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            openbitfun.com
          </a>
          <a class="btn btn-ghost" href="https://github.com/GCWing/空灵语言" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
          </a>
        </div>
      </section>

      <div class="flow" aria-label="Connection flow">
        <div class="flow-node">
          <div class="flow-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </div>
          <span class="flow-label" data-i18n="flowDesktop">桌面端</span>
          <span class="flow-sublabel" data-i18n="flowDesktopSub">空灵语言 Agent</span>
        </div>
        <div class="flow-arrow"><span class="flow-arrow-label">WebSocket</span></div>
        <div class="flow-node">
          <div class="flow-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </div>
          <span class="flow-label" data-i18n="flowRelay">中继服务</span>
          <span class="flow-sublabel" data-i18n="flowRelaySub">配对 & 转发</span>
        </div>
        <div class="flow-arrow"><span class="flow-arrow-label">HTTP</span></div>
        <div class="flow-node">
          <div class="flow-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          </div>
          <span class="flow-label" data-i18n="flowMobile">移动端</span>
          <span class="flow-sublabel" data-i18n="flowMobileSub">远程控制</span>
        </div>
      </div>

      <div class="features">
        <article class="feat">
          <div class="feat-head">
            <div class="feat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
            <h3 data-i18n="f1t">建立连接</h3>
          </div>
          <p data-i18n="f1d">承接配对请求，建立远程会话。</p>
        </article>
        <article class="feat">
          <div class="feat-head">
            <div class="feat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></div>
            <h3 data-i18n="f2t">消息转发</h3>
          </div>
          <p data-i18n="f2d">桥接 WebSocket 与 HTTP 双向通信。</p>
        </article>
        <article class="feat">
          <div class="feat-head">
            <div class="feat-icon slate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div>
            <h3 data-i18n="f3t">自托管友好</h3>
          </div>
          <p data-i18n="f3d">私有部署、自定义域名与反向代理。</p>
        </article>
      </div>
    </main>

    <footer>空灵语言 Relay Server · Self-Hosted Gateway for Remote Connect</footer>
  </div>

  <script>
    var I={
      zh:{status:'服务运行中',desc:'桌面端与移动端之间的中继服务，提供配对与消息转发能力。',
        f1t:'建立连接',f1d:'承接配对请求，建立远程会话。',f2t:'消息转发',f2d:'桥接 WebSocket 与 HTTP 双向通信。',f3t:'自托管友好',f3d:'私有部署、自定义域名与反向代理。',
        flowDesktop:'桌面端',flowDesktopSub:'空灵语言 Agent',flowRelay:'中继服务',flowRelaySub:'配对 & 转发',flowMobile:'移动端',flowMobileSub:'远程控制'},
      en:{status:'Service Running',desc:'Relay service between desktop and mobile, enabling pairing and message forwarding.',
        f1t:'Connect',f1d:'Handle pairing requests, create remote sessions.',f2t:'Relay',f2d:'Bridge WebSocket and HTTP bidirectionally.',f3t:'Self-Host',f3d:'Private deploy, custom domains & reverse proxy.',
        flowDesktop:'Desktop',flowDesktopSub:'空灵语言 Agent',flowRelay:'Relay Server',flowRelaySub:'Pair & Forward',flowMobile:'Mobile',flowMobileSub:'Remote Control'}
    };
    var L=(navigator.language||'').startsWith('zh')?'zh':'en';
    function set(l){L=l;document.documentElement.lang=l==='zh'?'zh-CN':'en';var s=I[l];document.querySelectorAll('[data-i18n]').forEach(function(e){var k=e.getAttribute('data-i18n');if(s[k])e.textContent=s[k]})}
    document.getElementById('langToggle').addEventListener('click',function(){set(L==='zh'?'en':'zh')});
    set(L);
  </script>
</body>
</html>
