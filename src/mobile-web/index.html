<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#121214" />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" type="image/png" href="./src/assets/Logo-ICON.png" />
  <link rel="apple-touch-icon" href="./src/assets/Logo-ICON.png" />
  <title>空灵语言 Remote</title>
  <script>
    (function() {
      var t = 'dark';
      try { var s = localStorage.getItem('bitfun-mobile-theme'); if (s === 'dark' || s === 'light') t = s; }
      catch(e) { if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) t = 'light'; }
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.colorScheme = t;
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    html[data-theme="dark"] body  { background-color: #121214; color: #e8e8e8; }
    html[data-theme="light"] body { background-color: #f2f2f7; color: #1c1c1e; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
